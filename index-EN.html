<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="./public/style.css" />
  <title> Metabolic Rate Calculator</title>
</head>

<body lang="en">
    <div class="language-switch">
        <a href="./index-EN.html"><button class="lang-btn">EN</button></a>
        <a href="./index-FR.html"><button class="lang-btn">FR</button></a>
        <a href="./index-ES.html"><button class="lang-btn">ES</button></a>
          
      </div>
  <header>
    <h1 class="title">Metabolic Rate Calculator</h1>
    <img src="./public/images/calcCal.png" alt="calorias" class="logo" />
  </header>

  <main class="container">
    <form class="form" id="formulario">

      <fieldset>
        <div class="field-group">
          <label for="genero">Sex</label>
          <select name="genero" id="genero">
            <option value="Feminino">Female</option>
            <option value="Masculino">Male</option>
          </select>
        </div>

        <div class="field-group">
          <label for="peso">Weight <small>(kg)</small></label>
          <input type="number" name="peso" id="peso" step="0.01" min="0" size="4" autofocus required />
        </div>

        <div class="field-group">
          <label for="altura">Height <small>(cm)</small></label>
          <input type="number" name="altura" id="altura" step="0.01" min="0" size="5" required />
        </div>

        <div class="field-group">
          <label for="idade">Age <small>(years)</small></label>
          <input type="number" name="idade" id="idade" step="0.01" min="0" size="4" required />
        </div>

        <div class="field-btn">
          <button class="button" type="submit">Calculate!</button>
        </div>

      </fieldset>

    </form>

    <div class="resultado-container" id="resultado">
      <h2>Your Result Was:</h2>
      <!--The information appears after the metabolic calculation-->
    </div>

  </main>
  <footer>
    <br>
    References:</br>
    <br> <a href="https://www.scielo.br/pdf/abcd/v29n3/pt_0102-6720-abcd-29-03-00185.pdf">https://www.scielo.br/pdf/abcd/v29n3/pt_0102-6720-abcd-29-03-00185.pdf</a> </br>
    <br><a href="https://www.leighpeele.com/mifflin-st-jeor-calculator">https://www.leighpeele.com/mifflin-st-jeor-calculator</a></br>
    <script src="./public/scripts.js" type="text/javascript"></script>
  </footer>
</body>

</html>
